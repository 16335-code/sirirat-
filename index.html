<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio ศิริรัตน์</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#87CEFA,#B0E0E6,#E0FFFF);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* กล่องหลัก */

.container{

width:80%;
max-width:900px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
z-index:10;

}

/* หัวข้อ */

h1{

font-size:45px;
color:white;
text-shadow:2px 2px 5px gray;

}

h2{

color:white;
margin-top:10px;

}

p{

font-size:22px;
color:white;
margin-top:10px;

}

/* เมนู */

.menu{

margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}

.menu a{

text-decoration:none;
padding:15px 30px;
background:white;
color:#3498db;
font-weight:bold;
border-radius:40px;
transition:0.4s;
font-size:18px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.menu a:hover{

background:#3498db;
color:white;
transform:translateY(-8px) scale(1.05);

}

/* หิมะ */

.snow{
position:absolute;
top:-10px;
color:white;
user-select:none;
animation:snow linear infinite;
}

@keyframes snow{

0%{
transform:translateY(-10px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;

}

}

footer{

margin-top:40px;
color:white;
font-size:18px;

}

</style>

</head>

<body>

<!-- หิมะ -->

<script>

for(let i=0;i<80;i++){

let snow=document.createElement("div");

snow.className="snow";

snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";

snow.style.fontSize=(10+Math.random()*25)+"px";

snow.style.animationDuration=(5+Math.random()*10)+"s";

snow.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(snow);

}

</script>

<div class="container">

<h1>Portfolio</h1>

<h2>นางสาวศิริรัตน์ ยอดสร้อย</h2>

<p>ชั้นมัธยมศึกษาปีที่ 6/1</p>

<p>โรงเรียนพานทอง</p>

<a href="profile.html">👩 ประวัติส่วนตัว</a>

<a href="sop.html">📖 SOP</a>

<a href="portfolio.html">🏆 ผลงาน</a>

<a href="contact.html">📱 ช่องทางติดต่อ</a>

</div>

<footer>

❄ Welcome To My Portfolio ❄

</footer>

</div>

</body>
</html>
