<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio ศิริรัตน์</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#87CEFA,#B0E0E6,#E0FFFF);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:20px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
text-decoration:none;
color:white;
font-size:20px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#003366;
transform:scale(1.15);
}

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

img{
width:220px;
height:220px;
border-radius:50%;
border:7px solid white;
object-fit:cover;
box-shadow:0 0 30px white;
margin-bottom:20px;
}

h1{
font-size:50px;
text-shadow:3px 3px 10px #00000055;
}

p{
font-size:22px;
margin-top:10px;
}

.btn{
margin-top:30px;
padding:15px 35px;
background:white;
color:#2196F3;
text-decoration:none;
border-radius:40px;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#2196F3;
color:white;
transform:scale(1.1);
}

.snow{
position:absolute;
top:-10px;
background:white;
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<nav>

<a href="index.html">🏠 หน้าแรก</a>

<a href="about.html">👤 ประวัติส่วนตัว</a>

<a href="contact.html">📞 ติดต่อ</a>

<a href="gpax.html">GPAX</a>
  
</nav>

<div class="container">

<img src="images/IMG_8128.jpeg">

<h1>นางสาวศิริรัตน์ ยอดสร้อย</h1>

<p>นักเรียนชั้นมัธยมศึกษาปีที่ 6/1</p>

<p>โรงเรียนพานทอง</p>

<a href="about.html" class="btn">เข้าสู่ Portfolio</a>

</div>

<script>

for(let i=0;i<120;i++){

let snow=document.createElement("div");

snow.className="snow";

snow.style.left=Math.random()*100+"vw";

let size=Math.random()*8+2;

snow.style.width=size+"px";

snow.style.height=size+"px";

snow.style.animationDuration=Math.random()*5+5+"s";

snow.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(snow);

}

</script>

</body>

</html>
