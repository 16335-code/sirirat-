        body{

            width:220px;
            height:220px;
            border-radius:50%;

            border:6px solid #87CEEB;

        }

        h2{
            color:#3498db;
            margin-bottom:20px;
        }

        p{
            line-height:1.8;
            color:#555;
            font-size:18px;
        }

        button{
            margin-top:30px;
            padding:15px 30px;
            background:#87CEEB;
            color:white;
            border:none;
            border-radius:30px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#3498db;
            transform:scale(1.05);
        }

        footer{
            background:#87CEEB;
            color:white;
            text-align:center;
            padding:20px;
