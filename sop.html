<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#87CEFA,#B0E0E6,#E0FFFF);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:18px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(12px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#003366;
transform:scale(1.1);
}

.container{
max-width:1000px;
margin:120px auto 50px;
padding:20px;
}

.card{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
font-size:45px;
margin-bottom:10px;
}

.line{
width:120px;
height:5px;
background:white;
margin:15px auto 35px;
border-radius:10px;
}

.sop{
font-size:20px;
line-height:2;
text-align:justify;
}

.btn{
display:inline-block;
margin-top:40px;
padding:15px 35px;
background:white;
color:#2196F3;
text-decoration:none;
border-radius:40px;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#2196F3;
color:white;
transform:scale(1.05);
}

.center{
text-align:center;
}

.snow{
position:fixed;
top:-10px;
background:white;
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<script>

for(let i=0;i<120;i++){

let snow=document.createElement("div");

snow.className="snow";

snow.style.left=Math.random()*100+"vw";

let size=Math.random()*8+2;

snow.style.width=size+"px";
snow.style.height=size+"px";

snow.style.animationDuration=(Math.random()*5+5)+"s";

snow.style.animationDelay=(Math.random()*5)+"s";

document.body.appendChild(snow);

}

</script>
