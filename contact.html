<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#87CEFA,#B0E0E6,#E0FFFF);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow-x:hidden;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:18px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(12px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#003366;
transform:scale(1.1);
}

.container{
max-width:900px;
margin:120px auto 50px;
padding:20px;
}

.card{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
}

h1{
font-size:45px;
margin-bottom:10px;
}

.line{
width:120px;
height:5px;
background:white;
margin:15px auto 35px;
border-radius:10px;
}

.contact-box{
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,.15);
padding:18px 25px;
margin:18px 0;
border-radius:18px;
transition:.3s;
}

.contact-box:hover{
transform:translateX(8px);
background:rgba(255,255,255,.3);
}

.label{
font-size:22px;
font-weight:bold;
}

.value{
font-size:20px;
}

.value a{
color:white;
text-decoration:none;
}

.value a:hover{
text-decoration:underline;
}

.qr{
margin-top:35px;
}

.qr img{
width:180px;
height:180px;
border-radius:20px;
border:5px solid white;
object-fit:cover;
box-shadow:0 0 20px rgba(255,255,255,.8);
}

.home{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:white;
color:#2196F3;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:40px;
transition:.3s;
}

.home:hover{
background:#2196F3;
color:white;
}

.snow{
position:fixed;
top:-10px;
background:white;
border-radius:50%;
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>
